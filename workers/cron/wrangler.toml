name = "code-quests-cron"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
# 6:47 AM Cairo (UTC+2) = 4:47 UTC
# 7:48 PM Cairo (UTC+2) = 17:48 UTC
crons = ["47 4 * * *", "48 17 * * *"]

